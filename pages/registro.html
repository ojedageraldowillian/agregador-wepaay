<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Comercio | WePaay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4">
                    <div class="text-center mb-4">
                        <img src="../img/logoazul.png" alt="WePaay" style="max-height: 100px;">
                        <h2 class="fw-bold mt-3">Registro de Comercio</h2>
                        <p class="text-muted">Completá los datos para empezar a cobrar con WePaay</p>
                    </div>

                    <form action="procesar_registro.php" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="razon_social" class="form-label">Razón Social</label>
                                <input type="text" class="form-control" id="razon_social" name="razon_social" required>
                            </div>
                            <div class="col-md-6">
                                <label for="nombre_fantasia" class="form-label">Nombre de Fantasía</label>
                                <input type="text" class="form-control" id="nombre_fantasia" name="nombre_fantasia" required>
                            </div>

                            <div class="col-md-6">
                                <label for="cuit" class="form-label">CUIT / CUIL</label>
                                <input type="text" class="form-control" id="cuit" name="cuit" placeholder="XX-XXXXXXXX-X" required>
                            </div>
                            <div class="col-md-6">
                                <label for="categoria" class="form-label">Categoría Impositiva</label>
                                <select class="form-select" id="categoria" name="categoria">
                                    <option selected>Seleccionar...</option>
                                    <option value="monotributo">Monotributo</option>
                                    <option value="responsable_inscripto">Responsable Inscripto</option>
                                    <option value="exento">Exento</option>
                                </select>
                            </div>

                            <hr class="my-4">
                            <h3 class="h5 mb-3 fw-bold">Datos del Titular / Apoderado</h3>

                            <div class="col-md-6">
                                <label for="nombre_titular" class="form-label">Nombre y Apellido</label>
                                <input type="text" class="form-control" id="nombre_titular" name="nombre_titular" required>
                            </div>
                            <div class="col-md-6">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" class="form-control" id="dni" name="dni" required>
                            </div>

<div class="col-md-12">
    <label for="email" class="form-label">Correo Electrónico de contacto</label>
    <input 
        type="email" 
        class="form-control" 
        id="email" 
        name="email" 
        placeholder="ejemplo@correo.com.ar"
        required
        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
        title="Por favor, ingresa un correo electrónico válido (ej: nombre@dominio.com)"
    >
    <div class="invalid-feedback">
        Por favor, introduce un correo electrónico válido.
    </div>
</div>

<div class="col-12 mt-3">
                            <div class="form-check text-start">
                                <input class="form-check-input" type="checkbox" id="terminos" required>
                                <label class="form-check-label small text-muted" for="terminos">
                                    Acepto los <a href="#" style="color: #1a73b9;">términos y condiciones</a>.
                                </label>
                            </div>
                        </div>

                        <div class="col-12 mt-4 text-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm" 
                                    style="background-color: #1a73b9; border-color: #1a73b9; font-weight: 500;">
                                Finalizar Registro
                            </button>
                            
                            <div class="mt-3">
                                <a href="../index.html" class="text-decoration-none small text-muted">Volver al inicio</a>
                            </div>
                        </div>

                    </div> </form> </div> </div> </div> </div> </body>
</html>
